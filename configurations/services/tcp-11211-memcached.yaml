apiVersion: "v1"
protocol: "tcp"
address: ":11211"
description: "Memcached 1.6.17"
banner: ""
commands:
  - regex: "^stats"
    handler: "STAT pid 12345\r\nSTAT uptime 834221\r\nSTAT time 1678901234\r\nSTAT version 1.6.17\r\nSTAT curr_connections 10\r\nSTAT total_connections 1523\r\nSTAT bytes 1048576\r\nSTAT curr_items 42\r\nSTAT total_items 9876\r\nEND\r\n"
    name: "stats"
  - regex: "^get (.+)"
    handler: "END\r\n"
    name: "get"
  - regex: "^set (.+)"
    handler: "STORED\r\n"
    name: "set"
  - regex: "^version"
    handler: "VERSION 1.6.17\r\n"
    name: "version"
  - regex: "^(.+)$"
    handler: "ERROR\r\n"
    name: "catch_all"
deadlineTimeoutSeconds: 60
serverName: "memcached-cache-01"
