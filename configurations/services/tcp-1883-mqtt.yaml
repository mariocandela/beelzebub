apiVersion: "v1"
protocol: "tcp"
address: ":1883"
description: "MQTT Broker"
banner: ""
commands:
  - regex: "\\x10"
    handler: "\x20\x02\x00\x00"
    name: "connect_ack"
  - regex: "\\x30"
    handler: "\x40\x02\x00\x00"
    name: "publish_ack"
  - regex: "\\x82"
    handler: "\x90\x03\x00\x00\x00"
    name: "subscribe_ack"
  - regex: "^(.+)$"
    handler: ""
    name: "catch_all"
deadlineTimeoutSeconds: 60
serverName: "MQTT-BROKER-01"
