apiVersion: "v1"
protocol: "tcp"
address: ":6379"
description: "Redis 7.0.12"
commands:
  - regex: "^PING"
    handler: "+PONG\r\n"
    name: "ping"
  - regex: "^INFO"
    handler: "+INFO OK\r\n"
    name: "info"
  - regex: "^(.+)$"
    handler: "-ERR unknown command\r\n"
    name: "catch_all"
deadlineTimeoutSeconds: 10
serverName: "redis-test"
